<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You - ByteSavvy Africa</title>
    <meta
      name="description"
      content="Thank you for contacting us. We'll get back to you soon."
    />

    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary: #2563eb;
        --text: #1f2937;
      }
      body {
        font-family: "Poppins", sans-serif;
        color: var(--text);
        background: #f8fafc;
        min-height: 100vh;
        display: flex;
        align-items: center;
      }
      .thank-you-card {
        max-width: 600px;
        margin: 0 auto;
        text-align: center;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }
      .icon-success {
        font-size: 80px;
        color: var(--primary);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="thank-you-card bg-white">
        <i class="bi bi-check-circle-fill icon-success mb-4"></i>
        <h1 class="display-4 fw-bold">Thank You!</h1>
        <p class="lead">Your message has been sent successfully.</p>
        <p>
          We'll review your project details and get back to you within 24 hours.
        </p>
        <hr class="my-4" />
        <a href="ByteSavvy labs.html" class="btn btn-primary btn-lg"
          >Back to Home</a
        >
        <a href="tel:+254759428571" class="btn btn-outline-primary btn-lg ms-2">
          <i class="bi bi-phone"></i> Call Us Now
        </a>
      </div>
    </div>

    <!-- Bootstrap JS (optional, only if you want animations) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
